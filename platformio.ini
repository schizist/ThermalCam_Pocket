; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared settings
[common]
lib_deps =
    adafruit/Adafruit AMG88xx Library
    adafruit/Adafruit Unified Sensor
    bodmer/TFT_eSPI
    bblanchon/ArduinoJson
    madhephaestus/ESP32Servo@^3.0.9
extra_scripts = pre:scripts/load_env.py

; USB upload
[env:t-display]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}

; OTA upload — connect to the ThermalCam-XXXX AP first, then run:
;   pio run -t upload -e t-display-ota
[env:t-display-ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=${sysenv.OTA_PASSWORD}
