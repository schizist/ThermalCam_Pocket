[common]
lib_deps =
    adafruit/Adafruit AMG88xx Library
    adafruit/Adafruit Unified Sensor
    bblanchon/ArduinoJson
    madhephaestus/ESP32Servo@^3.0.9
extra_scripts = pre:scripts/load_env.py

; USB upload
[env:dollhead]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}

; OTA upload — device must be on the same network, then run:
;   pio run -t upload -e dollhead-ota
[env:dollhead-ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
upload_protocol = espota
upload_port = dollhead.local
upload_flags = --auth=${sysenv.OTA_PASSWORD}
